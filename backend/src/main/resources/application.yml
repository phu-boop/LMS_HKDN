spring:
  application:
    name: lms-platform
  
  datasource:
    url: jdbc:postgresql://localhost:5433/lms_db
    username: lms_dev
    password: dev_password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration

logging:
  level:
    com.lms.platform: DEBUG
    org.springframework.security: INFO
jwt:
  secret: mySuperSecretKeyForJwtAuthentication12345678901234567890

  access:
    expiration: 3600000

  refresh:
    expiration: 604800000


springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  domain-prefix: .daihoc.io.vn