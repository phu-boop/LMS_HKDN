worker_processes auto;

events { worker_connections 1024; }

http {
  server_tokens off;
  client_max_body_size 200m;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream n8n_upstream {
    server n8n:5678;
    keepalive 64;
  }

  # -- n8n ---------------------------------------------------------------

  server {
    listen 80;
    listen [::]:80;
    server_name n8n-dev.daihoc.io.vn;

    location ^~ /.well-known/acme-challenge/ {
      root /var/www/certbot;
      default_type "text/plain";
      try_files $uri =404;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name n8n-dev.daihoc.io.vn;

    ssl_certificate     /etc/letsencrypt/live/n8n-dev.daihoc.io.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/n8n-dev.daihoc.io.vn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
      proxy_pass http://n8n_upstream;
      proxy_http_version 1.1;
      proxy_buffering off;

      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host  $host;
      proxy_set_header X-Forwarded-Port  $server_port;

      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    location ^~ /.well-known/acme-challenge/ {
      root /var/www/certbot;
      default_type "text/plain";
      try_files $uri =404;
    }
  }

  # -- LMS API -----------------------------------------------------------

  server {
    listen 80;
    listen [::]:80;
    server_name dev-api.daihoc.io.vn;

    location ^~ /.well-known/acme-challenge/ {
      root /var/www/certbot;
      default_type "text/plain";
      try_files $uri =404;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name dev-api.daihoc.io.vn;

    ssl_certificate     /etc/letsencrypt/live/dev-api.daihoc.io.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev-api.daihoc.io.vn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 100M;

    location ^~ /.well-known/acme-challenge/ {
      root /var/www/certbot;
      default_type "text/plain";
      try_files $uri =404;
    }

    location / {
      proxy_pass http://172.18.0.1:5294;
      proxy_http_version 1.1;

      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      proxy_read_timeout 300s;
      proxy_connect_timeout 75s;
    }
  }

  # -- MinIO gateway -----------------------------------------------------

  server {
    listen 80;
    listen [::]:80;
    server_name media.daihoc.io.vn minio-console.daihoc.io.vn;

    location ^~ /.well-known/acme-challenge/ {
      root /var/www/certbot;
      default_type "text/plain";
      try_files $uri =404;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name media.daihoc.io.vn;

    ssl_certificate     /etc/letsencrypt/live/media.daihoc.io.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/media.daihoc.io.vn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
      proxy_pass http://172.18.0.1:9000;
      proxy_http_version 1.1;

      proxy_set_header Host              $http_host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Range             $http_range;
      proxy_set_header If-Range          $http_if_range;
      proxy_no_cache 1;
      proxy_cache_bypass 1;

      proxy_read_timeout 300s;
      proxy_connect_timeout 10s;
      proxy_buffers 16 256k;
      proxy_buffer_size 256k;
      proxy_busy_buffers_size 512k;
    }

    location /minio/health/live {
      proxy_pass http://172.18.0.1:9000/minio/health/live;
      proxy_read_timeout 5s;
    }
  }

  server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name minio-console.daihoc.io.vn;

    ssl_certificate     /etc/letsencrypt/live/media.daihoc.io.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/media.daihoc.io.vn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
      proxy_pass http://172.18.0.1:9001;
      proxy_http_version 1.1;

      proxy_set_header Host              $http_host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection "upgrade";

      proxy_read_timeout 300s;
    }
  }

  # -- LMS Frontend ------------------------------------------------------
  # Current certificate covers these exact hosts:
  # - id.daihoc.io.vn
  # - lms-admin.daihoc.io.vn
  # - stem.daihoc.io.vn
  # For additional tenant subdomains, re-issue the cert or move to a wildcard cert.

  server {
    listen 80;
    listen [::]:80;
    server_name id.daihoc.io.vn lms-admin.daihoc.io.vn stem.daihoc.io.vn;

    location ^~ /.well-known/acme-challenge/ {
      root /var/www/certbot;
      default_type "text/plain";
      try_files $uri =404;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name id.daihoc.io.vn lms-admin.daihoc.io.vn stem.daihoc.io.vn;

    ssl_certificate     /etc/letsencrypt/live/lms-frontend.daihoc.io.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lms-frontend.daihoc.io.vn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location ^~ /.well-known/acme-challenge/ {
      root /var/www/certbot;
      default_type "text/plain";
      try_files $uri =404;
    }

    location / {
      proxy_pass http://172.18.0.1:3000;
      proxy_http_version 1.1;

      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host  $host;
      proxy_set_header X-Forwarded-Port  $server_port;

      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      proxy_read_timeout 300s;
      proxy_connect_timeout 75s;
    }
  }
}
