# Nginx configuration for LMS Web Frontend (Production)
# This is a reverse proxy for Next.js application

upstream lms_web {
    server lms-web:3000;
    keepalive 64;
}

# Redirect HTTP to HTTPS (optional - uncomment if SSL is configured)
# server {
#     listen 80;
#     server_name _;
#     return 301 https://$host$request_uri;
# }

# Main server block
server {
    listen 80;
    # All subdomains:
    #   id.daihoc.io.vn      → Login page
    #   lms-admin.daihoc.io.vn   → Admin dashboard
    #   *.daihoc.io.vn       → Tenant dashboards (stem, english, ...)
    server_name id.daihoc.io.vn lms-admin.daihoc.io.vn *.daihoc.io.vn;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript;
    gzip_min_length 1000;

    # Max upload size
    client_max_body_size 100M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Static files caching
    location /_next/static/ {
        proxy_pass http://lms_web/_next/static/;
        proxy_cache_valid 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /static/ {
        proxy_pass http://lms_web/static/;
        proxy_cache_valid 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location /public/ {
        proxy_pass http://lms_web/public/;
        proxy_cache_valid 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # API routes
    location /api/ {
        proxy_pass http://lms_web/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://lms_web/api/health;
        access_log off;
        proxy_read_timeout 5s;
    }

    # Everything else - Next.js handles routing
    location / {
        proxy_pass http://lms_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        
        # Prevent caching of HTML pages
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }
}
