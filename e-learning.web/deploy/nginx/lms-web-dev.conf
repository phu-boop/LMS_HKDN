# Nginx configuration for LMS Web Frontend (Development)
# Reverse proxy for Next.js development server

upstream lms_web_dev {
    server lms-web-dev:3000;
    keepalive 32;
}

server {
    listen 80 default_server;
    server_name _;

    # Disable gzip for development (makes debugging easier)
    gzip off;

    # Max upload size
    client_max_body_size 100M;

    # Development headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Static files
    location /_next/ {
        proxy_pass http://lms_web_dev/_next/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /public/ {
        proxy_pass http://lms_web_dev/public/;
    }

    # Hot Module Reload (HMR) for development
    location /_next/webpack-hmr {
        proxy_pass http://lms_web_dev/_next/webpack-hmr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }

    # API routes
    location /api/ {
        proxy_pass http://lms_web_dev/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Health check
    location /health {
        proxy_pass http://lms_web_dev/api/health;
        access_log off;
    }

    # Everything else
    location / {
        proxy_pass http://lms_web_dev;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }
}
