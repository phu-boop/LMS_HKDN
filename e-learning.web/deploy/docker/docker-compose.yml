services:
  lms-web:
    container_name: lms-web
    image: lms-web:latest
    build:
      context: ../../
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_HOST_API_URL: ${NEXT_PUBLIC_HOST_API_URL}
        NEXT_PUBLIC_ROOT_DOMAIN: ${NEXT_PUBLIC_ROOT_DOMAIN:-daihoc.io.vn}
        NEXT_PUBLIC_LOGIN_DOMAIN: ${NEXT_PUBLIC_LOGIN_DOMAIN:-https://id.daihoc.io.vn}
        NEXT_PUBLIC_ADMIN_DOMAIN: ${NEXT_PUBLIC_ADMIN_DOMAIN:-https://lms-admin.daihoc.io.vn}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      TZ: Asia/Ho_Chi_Minh
      NEXT_PUBLIC_HOST_API_URL: ${NEXT_PUBLIC_HOST_API_URL}
      NEXT_PUBLIC_ROOT_DOMAIN: ${NEXT_PUBLIC_ROOT_DOMAIN:-daihoc.io.vn}
      NEXT_PUBLIC_LOGIN_DOMAIN: ${NEXT_PUBLIC_LOGIN_DOMAIN:-https://id.daihoc.io.vn}
      NEXT_PUBLIC_ADMIN_DOMAIN: ${NEXT_PUBLIC_ADMIN_DOMAIN:-https://lms-admin.daihoc.io.vn}
    env_file:
      - .env                 # Production environment file (DO NOT commit to git)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - lms-network
    volumes:
      - lms-web-cache:/app/.next/cache

  nginx:
    image: nginx:alpine
    container_name: lms-web-nginx
    restart: unless-stopped
    # ports are disabled - n8n nginx reverse proxy handles external 80/443
    # ports:
    #   - "80:80"
    #   - "443:443"
    volumes:
      - ./nginx/lms-web.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - lms-web
    networks:
      - lms-network

volumes:
  lms-web-cache:

networks:
  lms-network:
    driver: bridge
