services:
  lms-web-dev:
    container_name: lms-web-dev
    image: lms-web:dev
    build:
      context: ../../
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_HOST_API_URL: ${NEXT_PUBLIC_HOST_API_URL:-https://dev-api.daihoc.io.vn}
        NEXT_PUBLIC_ROOT_DOMAIN: ${NEXT_PUBLIC_ROOT_DOMAIN:-daihoc.io.vn}
        NEXT_PUBLIC_LOGIN_DOMAIN: ${NEXT_PUBLIC_LOGIN_DOMAIN:-https://id.daihoc.io.vn}
        NEXT_PUBLIC_ADMIN_DOMAIN: ${NEXT_PUBLIC_ADMIN_DOMAIN:-https://lms-admin.daihoc.io.vn}
    restart: unless-stopped
    ports:
      - "8081:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      TZ: Asia/Ho_Chi_Minh
      NEXT_PUBLIC_HOST_API_URL: ${NEXT_PUBLIC_HOST_API_URL:-https://dev-api.daihoc.io.vn}
      NEXT_PUBLIC_ROOT_DOMAIN: ${NEXT_PUBLIC_ROOT_DOMAIN:-daihoc.io.vn}
      NEXT_PUBLIC_LOGIN_DOMAIN: ${NEXT_PUBLIC_LOGIN_DOMAIN:-https://id.daihoc.io.vn}
      NEXT_PUBLIC_ADMIN_DOMAIN: ${NEXT_PUBLIC_ADMIN_DOMAIN:-https://lms-admin.daihoc.io.vn}
    env_file:
      - .env.dev             # Development environment file (copy from .env.example)
      - .env.dev.local       # Optional: local overrides (gitignored)
    volumes:
      - ../../src:/app/src
      - ../../public:/app/public
      - /app/node_modules
      - /app/.next
    command: yarn dev -p 3000
    networks:
      - lms-network-dev

  nginx-dev:
    image: nginx:alpine
    container_name: lms-web-nginx-dev
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/lms-web-dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - lms-web-dev
    networks:
      - lms-network-dev

networks:
  lms-network-dev:
    driver: bridge
