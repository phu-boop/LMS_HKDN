openapi: 3.1.1
info:
  title: Aig LMS API
  description: E-Learning Management System — Backend API
  version: v1
servers:
  - url: http://localhost:8080/
paths:
  /health:
    get:
      tags:
        - Health
      summary: Overall health status
      responses:
        "200":
          description: OK
  /health/live:
    get:
      tags:
        - Health
      summary: Liveness — app is running
      responses:
        "200":
          description: OK
  /health/ready:
    get:
      tags:
        - Health
      summary: Readiness — app is ready to serve traffic
      responses:
        "200":
          description: OK
  /api/identity/identify:
    post:
      tags:
        - Identity
      summary: Identifier-first lookup — returns nextStep and tenant branding; always
        responds without revealing user existence
      operationId: Identify
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdentifyRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentifyResult"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentifyError"
  /api/tenants/resolve:
    get:
      tags:
        - Aig.Lms.Api
      summary: Resolve tenant branding from a domain or host
      operationId: ResolveTenantByDomain
      parameters:
        - name: domain
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolveTenantResponse"
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: Not Found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/admin/schools/{schoolId}/users:
    get:
      tags:
        - Schools
        - Users
      summary: List users belonging to a school
      operationId: GetSchoolUsers
      parameters:
        - name: schoolId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          required: true
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            type:
              - integer
              - string
            format: int32
        - name: pageSize
          in: query
          required: true
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            type:
              - integer
              - string
            format: int32
        - name: status
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: accountType
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResult"
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/admin/subscriptions:
    get:
      tags:
        - Schools
      summary: List subscriptions by scope with optional tenantId, schoolId, status
        and pagination filters
      operationId: ListSubscriptionsByScope
      parameters:
        - name: tenantId
          in: query
          schema:
            type: string
            format: uuid
        - name: schoolId
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          required: true
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            type:
              - integer
              - string
            format: int32
        - name: pageSize
          in: query
          required: true
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            type:
              - integer
              - string
            format: int32
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionListResult"
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "403":
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/identity/auth/login:
    post:
      tags:
        - Auth
      summary: Login — returns JWT access token + refresh token
      operationId: Login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginCommand"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginError"
        "429":
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginError"
  /api/identity/auth/refresh:
    post:
      tags:
        - Auth
      summary: Exchange a valid refresh token for a new access token + rotated refresh
        token
      operationId: RefreshToken
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginError"
  /api/identity/auth/logout:
    post:
      tags:
        - Auth
      summary: Revoke the refresh token session (logout)
      operationId: Logout
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
        required: true
      responses:
        "204":
          description: No Content
  /api/identity/auth/change-password:
    post:
      tags:
        - Auth
      summary: Change the current user's password — revokes all other active sessions
      operationId: ChangePassword
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
        required: true
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/identity/auth/reset-password:
    post:
      tags:
        - Auth
      summary: Admin reset a user's password — revokes all sessions, forces re-login
      operationId: ResetPassword
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
        required: true
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/identity/auth/sessions:
    get:
      tags:
        - Auth
      summary: List all active sessions for the current user
      operationId: GetMySessions
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionDto"
    delete:
      tags:
        - Auth
      summary: Logout everywhere — revoke all other active sessions, keep current
        session
      operationId: RevokeAllOtherSessions
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevokeAllOtherSessionsRequest"
        required: true
      responses:
        "200":
          description: OK
  /api/identity/auth/sessions/{sessionId}:
    delete:
      tags:
        - Auth
      summary: Revoke one of the current user's own sessions
      operationId: RevokeMySession
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/identity/auth/admin/sessions/{userId}:
    get:
      tags:
        - Auth
      summary: "Admin: list sessions for any user (active or full history)"
      operationId: AdminGetUserSessions
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: activeOnly
          in: query
          required: true
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionDto"
  /api/identity/auth/admin/sessions/{sessionId}:
    delete:
      tags:
        - Auth
      summary: "Admin: force-revoke any user session"
      operationId: AdminRevokeSession
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/identity/auth/admin/sessions/users/{userId}:
    delete:
      tags:
        - Auth
      summary: "Admin: force-revoke ALL active sessions for a specific user"
      operationId: AdminRevokeAllUserSessions
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/identity/workspaces:
    get:
      tags:
        - Identity
      summary: List all accessible workspaces (tenants) for the current user
      operationId: GetWorkspaces
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceDto"
  /api/identity/workspaces/{tenantId}/select:
    post:
      tags:
        - Identity
      summary: Switch active workspace — rotates refresh token, returns new access
        token scoped to selected tenant
      operationId: SelectWorkspace
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SelectWorkspaceRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginError"
  /api/admin/tenants:
    get:
      tags:
        - Admin Tenants
      summary: List tenants with optional status and search filters
      operationId: GetTenants
      parameters:
        - name: page
          in: query
          required: true
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            type:
              - integer
              - string
            format: int32
        - name: pageSize
          in: query
          required: true
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            type:
              - integer
              - string
            format: int32
        - name: status
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTenantsResult"
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    post:
      tags:
        - Admin Tenants
      summary: Create a new tenant with branding settings
      operationId: CreateTenant
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantCommand"
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTenantResult"
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "409":
          description: Conflict
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/admin/tenants/{id}:
    get:
      tags:
        - Admin Tenants
      summary: Get tenant details by ID
      operationId: GetTenantById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantDto"
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: Not Found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    put:
      tags:
        - Admin Tenants
      summary: Update tenant information and branding
      operationId: UpdateTenant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateTenantResult"
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: Not Found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/admin/tenants/{id}/status:
    patch:
      tags:
        - Admin Tenants
      summary: "Change tenant status: ACTIVE | INACTIVE | LOCKED"
      operationId: ChangeTenantStatus
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeTenantStatusRequest"
        required: true
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: Not Found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/admin/users/{id}:
    get:
      tags:
        - Users
      summary: Get a user by ID
      operationId: GetUserById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: Not Found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    put:
      tags:
        - Users
      summary: Update user profile (fullName, email, status)
      operationId: UpdateUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateUserResult"
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: Not Found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    delete:
      tags:
        - Users
      summary: Soft-delete a user (is_deleted = true, status = DELETED) — irreversible
        via API
      operationId: DeleteUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: Not Found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/admin/users:
    get:
      tags:
        - Users
      summary: "List users with optional filters: school, tenant, role, accountType,
        status, search"
      operationId: ListUsers
      parameters:
        - name: schoolId
          in: query
          schema:
            type: string
            format: uuid
        - name: tenantId
          in: query
          schema:
            type: string
            format: uuid
        - name: roleId
          in: query
          schema:
            type: string
            format: uuid
        - name: accountType
          in: query
          schema:
            type: string
        - name: page
          in: query
          required: true
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            type:
              - integer
              - string
            format: int32
        - name: pageSize
          in: query
          required: true
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            type:
              - integer
              - string
            format: int32
        - name: status
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResult"
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    post:
      tags:
        - Users
      summary: Create a new user for a school
      operationId: CreateUser
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateUserResult"
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "409":
          description: Conflict
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/admin/users/{id}/status:
    patch:
      tags:
        - Users
      summary: "Change user status: ACTIVE | INACTIVE | LOCKED | DISABLED"
      operationId: ChangeUserStatus
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeStatusRequest"
        required: true
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: Not Found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/admin/users/{id}/avatar:
    patch:
      tags:
        - Users
      summary: Update user avatar URL
      operationId: UpdateAvatar
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAvatarRequest"
        required: true
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: Not Found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/admin/users/{id}/reset-password:
    post:
      tags:
        - Users
      summary: Admin resets a user's password. Also clears failed login count and lock.
      operationId: ResetUserPassword
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
        required: true
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: Not Found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/admin/users/import/template:
    get:
      tags:
        - Users
      summary: Download the standard Excel template for bulk user import
      operationId: GetImportTemplate
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IResult"
  /api/admin/users/import:
    post:
      tags:
        - Users
      summary: Bulk import users from an Excel file (.xlsx). Returns per-row
        success/failure report.
      operationId: BulkImportUsers
      parameters:
        - name: schoolId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: tenantId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkImportUsersResult"
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/admin/users/{id}/tenants:
    get:
      tags:
        - Users
      summary: List tenant assignments for a user (inherited + manual)
      operationId: GetUserTenants
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserTenantDto"
        "401":
          description: Unauthorized
          content:
            application/problem+json:
