# Docker Compose for dev server deployment
# Usage: docker compose -f deploy/docker/docker-compose.dev.yml up -d --build

services:
  redis:
    image: redis:7.2-alpine
    container_name: lms-redis
    restart: unless-stopped
    command: >
      sh -c 'exec redis-server
      --appendonly yes
      --save 60 1000
      --requirepass "$${REDIS_PASSWORD}"'
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - lms-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../
      dockerfile: Dockerfile
    container_name: lms-api
    restart: unless-stopped
    ports:
      - "5294:5294"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=${DB_HOST:-host.docker.internal};Port=${DB_PORT:-5434};Database=${DB_NAME:-lms_dev};Username=${DB_USER:-lms_dev};Password=${DB_PASSWORD}"
      Jwt__SecretKey: "${JWT_SECRET_KEY}"
      Jwt__Issuer: "aig-lms"
      Jwt__Audience: "aig-lms-clients"
      Jwt__ExpiryMinutes: 60
      Cors__AllowedOrigins__0: "${CORS_ORIGIN_1:-http://localhost:3000}"
      Cors__AllowedOrigins__1: "${CORS_ORIGIN_2:-http://localhost:5173}"
      Tenancy__AdminSubdomain: "${TENANCY_ADMIN_SUBDOMAIN:-admin}"
      Tenancy__AdminDomains__0: "${TENANCY_ADMIN_DOMAIN_1:-id.daihoc.io.vn}"
      Tenancy__AdminDomains__1: "${TENANCY_ADMIN_DOMAIN_2:-admin.daihoc.io.vn}"
      Tenancy__TenantBaseDomains__0: "${TENANCY_BASE_DOMAIN_1:-daihoc.io.vn}"
      Tenancy__LocalHosts__3: "dev-api.daihoc.io.vn"
      ObjectStorage__Endpoint: "${ObjectStorage__Endpoint:-http://host.docker.internal:9000}"
      ObjectStorage__UseSSL: "${ObjectStorage__UseSSL:-false}"
      ObjectStorage__AccessKey: "${ObjectStorage__AccessKey}"
      ObjectStorage__SecretKey: "${ObjectStorage__SecretKey}"
      ObjectStorage__ContentBucket: "${ObjectStorage__ContentBucket:-lms-content}"
      ObjectStorage__HlsBucket: "${ObjectStorage__HlsBucket:-lms-hls}"
      ObjectStorage__ThumbBucket: "${ObjectStorage__ThumbBucket:-lms-thumb}"
      ObjectStorage__StreamUrlTtlSeconds: "${ObjectStorage__StreamUrlTtlSeconds:-3600}"
      ObjectStorage__ViewUrlTtlSeconds: "${ObjectStorage__ViewUrlTtlSeconds:-3600}"
      ObjectStorage__DownloadUrlTtlSeconds: "${ObjectStorage__DownloadUrlTtlSeconds:-300}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5294/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  lms-redis-data:
