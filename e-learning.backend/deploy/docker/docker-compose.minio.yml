# MinIO Object Storage for LMS Media
# Usage:
#   docker compose -f deploy/docker/docker-compose.minio.yml --env-file deploy/docker/.env.minio up -d
#
# Buckets structure (created by setup-minio.sh):
#   lms-content/   - uploaded source files (private)
#   lms-hls/       - transcoded HLS segments (private)
#   lms-thumb/     - thumbnails / poster images (private)
#
# All buckets are private. FE only receives signed URLs from the LMS API.

services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: lms-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
      # Announce external URL so presigned URLs resolve correctly
      MINIO_SERVER_URL: "${MINIO_SERVER_URL:-http://localhost:9000}"
      MINIO_BROWSER_REDIRECT_URL: "${MINIO_CONSOLE_URL:-http://localhost:9001}"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - lms-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  lms-minio-data:
    name: lms-minio-data
