# Nginx Media Gateway for MinIO (LMS Phase 3)
# ---------------------------------------------------------------------------
# media.daihoc.io.vn  -> MinIO S3 API  (port 9000) — presigned URL access
# minio-console.daihoc.io.vn -> MinIO Console (port 9001) — admin only
#
# IMPORTANT: Buckets must remain PRIVATE.
# All object access goes through LMS API signed URLs, not direct bucket paths.
# ---------------------------------------------------------------------------

# ── HTTP → HTTPS redirect + ACME challenge ──────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name media.daihoc.io.vn minio-console.daihoc.io.vn;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── media.daihoc.io.vn → MinIO S3 API ───────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name media.daihoc.io.vn;

    ssl_certificate     /etc/letsencrypt/live/media.daihoc.io.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/media.daihoc.io.vn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # ── Public HLS bucket — allow GET requests (video streaming) ───────────────
    location ~ ^/lms-hls/ {
        proxy_pass http://172.18.0.1:9000;
        proxy_http_version 1.1;

        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Only allow GET, HEAD, OPTIONS (no PUT, DELETE)
        limit_except GET HEAD OPTIONS {
            deny all;
        }

        # Pass through Range headers for video seeking
        proxy_set_header Range             $http_range;
        proxy_set_header If-Range          $http_if_range;
        proxy_no_cache 1;
        proxy_cache_bypass 1;

        # Large file / HLS manifest response timeout
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;

        # Buffer large responses (HLS segments, video chunks)
        proxy_buffers          16 256k;
        proxy_buffer_size      256k;
        proxy_busy_buffers_size 512k;
    }

    # ── Private buckets — require presigned URLs ──────────────────────────────
    # Block any request that is NOT a presigned URL (no X-Amz-Signature query param)
    # This prevents accidental direct object access.
    location / {
        proxy_pass http://172.18.0.1:9000;
        proxy_http_version 1.1;

        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pass through Range headers for video seeking
        proxy_set_header Range             $http_range;
        proxy_set_header If-Range          $http_if_range;
        proxy_no_cache 1;
        proxy_cache_bypass 1;

        # Large file / HLS manifest response timeout
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;

        # Buffer large responses (HLS segments, video chunks)
        proxy_buffers          16 256k;
        proxy_buffer_size      256k;
        proxy_busy_buffers_size 512k;
    }

    # Health / readiness probe — accessible internally
    location /minio/health/live {
        proxy_pass http://172.18.0.1:9000/minio/health/live;
        proxy_read_timeout 5s;
    }
}

# ── minio-console.daihoc.io.vn → MinIO Console ──────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name minio-console.daihoc.io.vn;

    ssl_certificate     /etc/letsencrypt/live/media.daihoc.io.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/media.daihoc.io.vn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Restrict console to trusted IPs — adjust CIDR to your office/VPN range
    # Comment out allow/deny lines if you want open access (not recommended)
    # allow 203.0.113.0/24;   # example: office IP range
    # deny  all;

    location / {
        proxy_pass http://172.18.0.1:9001;
        proxy_http_version 1.1;

        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket required for MinIO Console
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 300s;
    }
}
