# Nginx reverse proxy for LMS API
# Copy to /etc/nginx/sites-available/lms-api.conf
# ln -s /etc/nginx/sites-available/lms-api.conf /etc/nginx/sites-enabled/
# nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name 103.159.51.19 dev-api.daihoc.io.vn id.daihoc.io.vn admin.daihoc.io.vn *.daihoc.io.vn;

    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:5294;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed later)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Health check - bypass proxy buffering
    location /health {
        proxy_pass http://127.0.0.1:5294/health;
        proxy_read_timeout 5s;
    }
}
